// АВТОГЕНЕРАЦИЯ LOCAL.PROPERTIES ДЛЯ CI/CD
buildscript {
    def repoRoot = rootProject.file('../').absolutePath
    def flutterSdk = System.getenv("FLUTTER_ROOT") ?: ""
    
    // На сервере GitHub Actions создаем local.properties принудительно
    def localPropsFile = rootProject.file('local.properties')
    if (!localPropsFile.exists() && flutterSdk != "") {
        localPropsFile.write("flutter.sdk=${flutterSdk}\n")
    }
    
    // Дополнительно прокидываем во внутреннее свойство плагина
    System.setProperty("flutter.provider.localSourceDir", repoRoot)
}

plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin" // Теперь файл local.properties уже существует, и плагин инициализируется успешно!
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    flutterRoot = System.getenv("FLUTTER_ROOT")
}
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found.")
}

android {
    namespace "com.example.youtube_bg_player"
    compileSdkVersion 35
    ndkVersion "27.0.12077973"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.youtube_bg_player"
        minSdkVersion 23
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    implementation 'androidx.multidex:multidex:2.0.1'
}