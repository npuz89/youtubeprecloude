name: youtube_bg_player
description: YouTube player with background audio support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  youtube_player_flutter: ^9.1.1
  wakelock_plus: ^1.4.3 # Сюда добавлена поддержка нового Flutter Gradle Plugin
  audio_session: ^0.1.25 # Обновлено для стабильности на Android 14+ / SDK 34-35
  flutter_foreground_task: ^8.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  package_info_plus: ^8.1.3

flutter:
  uses-material-design: true