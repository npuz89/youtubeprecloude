name: youtube_bg_player
description: YouTube player with background audio support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  youtube_player_flutter: ^9.1.1
  wakelock_plus: ^1.2.8
  audio_session: ^0.1.21
  flutter_foreground_task: ^8.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Принудительно фиксируем версию package_info_plus на ту,
# которая поддерживает новый Gradle — без этого любой пакет
# может потянуть старую несовместимую версию
dependency_overrides:
  package_info_plus: ^8.1.3

flutter:
  uses-material-design: true
